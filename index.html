<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event System</title>
  <link rel="stylesheet" href="event.css">
</head>
<body>

<h1>Event Management System</h1>

<div class="admuser">
 <div class="admin">
    <h3>Admin Panel</h3>
    <input type="text" id="eventName" placeholder="Event Name">
    <button onclick="App.addEvent()">Add Event</button>
 </div>
 <div class="user">
   <h3>User Register Form</h3>
   <input type="text" id="name" placeholder="Your Name"><br>
   <input type="email" id="email" placeholder="Your Email"><br>
   <select id="eventSelect"></select><br>
   <button id="registerBtn" onclick="App.registerEvent()">Register</button>
  </div>
</div>
<div id="eventTableContainer" style="display:none;">
  <table>
    <thead>
      <tr>
        <th>Number</th>
        <th>Event</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button onclick="UI.toggleTable(this)">Show Events</button>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="event.js"></script>



</body>
</html>
